<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tonis Wörterbuch</title>
    <meta
      name="description"
      content="Tonis Wörterbuch der Antonius Grundschule Kevelaer mit Suche, Vorlesen und Favoriten."
    >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="hero" aria-labelledby="app-title">
        <div class="mascot" aria-hidden="true">
          <img class="toni-mascot-image" src="assets/toni.png" alt="">
        </div>
        <div>
          <p class="eyebrow">Hallo, ich bin Toni.</p>
          <h1 id="app-title">Tonis Wörterbuch</h1>
          <p class="school-subtitle">Antonius Grundschule Kevelaer</p>
          <p class="helper-text">Ich helfe dir beim Schreiben.</p>
        </div>
      </header>

      <nav class="main-nav" aria-label="Hauptnavigation">
        <button class="nav-button" type="button" data-route="animals">Tiere</button>
        <button class="nav-button" type="button" data-route="school">Schule</button>
        <button class="nav-button" type="button" data-route="summer">Sommer</button>
        <button class="nav-button" type="button" data-route="food">Essen</button>
        <button class="nav-button" type="button" data-route="toys">Spielzeug</button>
        <button class="nav-button" type="button" data-route="people">Familie</button>
        <button class="nav-button" type="button" data-route="homePlace">Zuhause</button>
        <button class="nav-button" type="button" data-route="verbs">Tunwörter</button>
        <button class="nav-button" type="button" data-route="adjectives">Wiewörter</button>
        <button class="nav-button" type="button" data-route="favorites">Meine Wörter</button>
      </nav>

      <main>
        <section class="search-panel" aria-label="Wörter suchen">
          <label for="search-input">Wort suchen</label>
          <input id="search-input" type="search" placeholder="z. B. Sonne, Ball, schnell">
        </section>

        <section id="view-home" class="view is-visible" aria-labelledby="home-title">
          <div class="section-heading">
            <h2 id="home-title">Wähle ein Thema aus.</h2>
          </div>
          <div id="theme-grid" class="tile-grid" aria-live="polite"></div>
          <div id="home-search" class="home-search" hidden>
            <div class="section-heading">
              <h2>Suchergebnisse</h2>
            </div>
            <div id="home-search-grid" class="word-grid" aria-live="polite"></div>
          </div>
        </section>

        <section id="view-band" class="view" aria-labelledby="band-title">
          <div class="section-heading">
            <h2 id="band-title">Band Tiere</h2>
          </div>
          <div id="category-tabs" class="category-tabs" aria-label="Kategorien"></div>
          <div id="word-grid" class="word-grid" aria-live="polite"></div>
        </section>

        <section id="view-favorites" class="view" aria-labelledby="favorites-title">
          <div class="section-heading">
            <h2 id="favorites-title">Meine Wörter</h2>
          </div>
          <div id="favorite-grid" class="word-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <button id="scroll-top-button" class="scroll-top-button" type="button" hidden>↑ Nach oben</button>

    <script src="words.js"></script>
    <script src="app.js"></script>
  </body>
</html>
